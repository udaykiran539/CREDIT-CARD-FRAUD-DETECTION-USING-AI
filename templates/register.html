<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - CreditGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Same root and base styles as login.html */
        :root {
            --bg: #0a0c14;
            --surface: #10141f;
            --surface2: #151a2b;
            --text: #e2e8f0;
            --text-dim: #a5b4fc;
            --primary: #00f9a8;
            --accent: #0ea5e9;
            --glow-emerald: rgba(0, 249, 168, 0.22);
            --glow-cyan: rgba(14, 165, 233, 0.18);
            --danger: #ff4d6d;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg) url('https://images.unsplash.com/photo-1518770660439-4636190af475?w=1600&auto=format&fit=crop&q=80') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(16,20,31,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,249,168,0.1);
            padding: 1.1rem 0;
            z-index: 100;
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron', monospace; font-size: 2rem; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .nav-links a { color: var(--text-dim); text-decoration: none; margin-left: 2.3rem; font-weight: 500; }
        .nav-links a:hover { color: var(--accent); }

        .register-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 7rem 1rem 3rem;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 3.5rem 3rem;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(0,249,168,0.12);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .logo-center {
            font-family: 'Orbitron', monospace;
            font-size: 2.8rem;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 { text-align: center; color: var(--primary); font-size: 2.2rem; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.8rem; }
        label { display: block; margin-bottom: 0.7rem; color: var(--text-dim); font-weight: 500; }
        input {
            width: 100%;
            padding: 1.1rem 1.4rem;
            background: var(--surface2);
            border: 1px solid rgba(14,165,233,0.3);
            border-radius: 12px;
            color: var(--text);
            font-size: 1.05rem;
        }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--glow-cyan); }

        .btn {
            width: 100%;
            padding: 1.3rem;
            background: linear-gradient(90deg, var(--primary), #00e695);
            color: #0a0c14;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            box-shadow: 0 12px 40px var(--glow-emerald);
            transition: all 0.35s;
        }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 24px 70px var(--glow-emerald); }

        .message { padding: 1.2rem; border-radius: 12px; margin-bottom: 1.5rem; text-align: center; background: rgba(255,77,109,0.12); color: var(--danger); border-left: 4px solid var(--danger); }

        .login-link { text-align: center; margin-top: 2rem; color: var(--text-dim); }
        .login-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; color: #7dd3fc; }
    </style>
</head>
<body>

<header>
    <div class="container">
        <nav>
            <a href="/" class="logo">CreditGuard</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/register">Register</a>
                <a href="/login">Login</a>
            </div>
        </nav>
    </div>
</header>

<div class="register-wrapper">
    <div class="card">
        <div class="logo-center">CreditGuard</div>
        <h1>Create Account</h1>

        {% if message %}
        <div class="message">{{ message }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</div>

</body>
</html>
